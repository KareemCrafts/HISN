app = "hisn"
primary_region = "iad"

[build]

[env]
  FLASK_HOST = "0.0.0.0"
  FLASK_PORT = "8080"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0

[[vm]]
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1

[mounts]
  source = "hisn_data"
  destination = "/app/data_volume"
