services:
  - type: web
    name: hisn
    env: python
    region: oregon
    plan: free
    buildCommand: pip install -r requirements.txt && python setup_data.py
    startCommand: python -m src.dashboard.app
    envVars:
      - key: FLASK_HOST
        value: 0.0.0.0
      - key: FLASK_PORT
        value: 10000
      - key: ABUSEIPDB_API_KEY
        sync: false
      - key: VIRUSTOTAL_API_KEY
        sync: false
      - key: OLLAMA_URL
        value: ""
      - key: OLLAMA_MODEL
        value: llama3.2
